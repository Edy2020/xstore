<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XStore - Catálogo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            max-width: 480px;
        }
        .card h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .card p {
            color: #888;
            margin-bottom: 1.5rem;
        }
        .badge {
            display: inline-block;
            background: #667eea22;
            color: #667eea;
            border: 1px solid #667eea44;
            padding: 0.4rem 1rem;
            border-radius: 99px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>XStore</h1>
        <p>Django está funcionando correctamente 🚀</p>
        <span class="badge">Django 6.0 · Catálogo App</span>
    </div>
</body>
</html>
